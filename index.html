<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>This is github</title>
    </head>
    <body>
        <h1>Github login</h1>
        <form id="loginForm" novalidate>
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required>
            <br>
            <label for="password">Password:</label>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="password" name="password" id="password" required
                    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9\W]).{6,}"
                    title="At least 6 chars, with uppercase, lowercase, and a number or symbol">
                <button type="button" id="togglePassword" style="padding: 6px 10px; font-size: 0.9rem;">Show</button>
            </div>
            <div id="passwordStrength" style="margin-top: 8px; font-weight: 600; color: #333;">Strength: </div>
            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
        <p id="msg" style="color: #c00; font-weight: 600;"></p>
        
        <script src="script.js"></script>
</body>
</html>
