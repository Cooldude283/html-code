<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>This is github</title>
    </head>
    <body>
        <h1>Github login</h1>
        <form id="loginForm" novalidate>
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9\W]).{6,}"
                title="At least 6 chars, with uppercase, lowercase, and a number or symbol">
            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
        <p id="msg" style="color: #c00; font-weight: 600;"></p>
        <script>
            const form = document.getElementById('loginForm');
            const msg = document.getElementById('msg');
            form.addEventListener('submit', e => {
                if (!form.checkValidity()) {
                    e.preventDefault();
                    msg.textContent = 'Password must be 6+ chars, include uppercase, lowercase, and at least one number or symbol.';
                    return;
                }
                msg.textContent = 'Submitted successfully!';
            });
        </script>
    </body>
</html>
